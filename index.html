<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sat Mini - Orbital Visualization</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #loading {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: #000; color: #aaa;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    }
    #info {
      position: fixed; bottom: 16px; left: 16px; z-index: 5;
      color: rgba(255,255,255,0.4); font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px; pointer-events: none; line-height: 1.6;
    }
    #title {
      position: fixed; top: 24px; right: 32px; z-index: 5;
      pointer-events: none; text-align: right;
      font-family: 'Playfair Display', 'Textile', Georgia, serif;
      color: #fff; line-height: 0.95; text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
    }
    #title .its { font-size: 18px; font-style: italic; display: block; text-align: right; margin-bottom: 2px; }
    #title .always { font-size: 42px; font-weight: bold; display: block; text-transform: uppercase; letter-spacing: 2px; }
    #title .sunny { font-size: 42px; font-weight: bold; display: block; text-transform: uppercase; letter-spacing: 2px; }
    #title .in { font-size: 18px; font-style: italic; display: inline; margin: 0 4px; }
    #title .space { font-size: 42px; font-weight: bold; display: inline; text-transform: uppercase; letter-spacing: 2px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.0",
      "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="info">
    AI Sat Mini &middot; 1000 km altitude &middot; Dawn-Dusk SSO<br>
    Drag to orbit &middot; Scroll to zoom
  </div>
  <div id="title">
    <span class="its">It's</span>
    <span class="always">Always</span>
    <span class="sunny">Sunny</span>
    <span class="in">in</span><span class="space">Space</span>
  </div>
  <canvas id="c"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Constants (1 unit = 1 km) ────────────────────────────
    const EARTH_RADIUS = 6371;
    const SAT_ALTITUDE = 1000;
    const SAT_DISTANCE = EARTH_RADIUS + SAT_ALTITUDE;
    const SUN_DIR = new THREE.Vector3(-0.12, 0.01, -0.99).normalize();
    const SUN_DIST = 50000;

    // ── Atmosphere shader (needs logdepthbuf includes) ───────
    const ATMOS_VS = `
      #include <common>
      #include <logdepthbuf_pars_vertex>
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;
      void main() {
        vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
        vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        #include <logdepthbuf_vertex>
      }
    `;
    const ATMOS_FS = `
      #include <common>
      #include <logdepthbuf_pars_fragment>
      uniform vec3 uColor;
      uniform float uIntensity;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;
      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorldPosition);
        float fresnel = pow(max(1.0 - dot(vWorldNormal, viewDir), 0.0), 3.0);
        gl_FragColor = vec4(uColor * fresnel * uIntensity, fresnel * 0.8);
        #include <logdepthbuf_fragment>
      }
    `;

    // ══════════════════════════════════════════════════════════
    // AISatMini — orbital datacenter satellite
    // ══════════════════════════════════════════════════════════
    class AISatMini extends THREE.Group {
      // Local frame:  X = radial,  Y = along-track,  Z = sun direction (-Z toward sun)
      // Solar panels: perpendicular to sun (flat in X-Y)
      // Core + radiators: parallel to sun rays (flat in X-Z, thin in Y)

      static PANEL_SPAN  = 0.085;   // 85 m each wing (170 m total)
      static PANEL_DEPTH = 0.012;   // 12 m
      static PANEL_THICK = 0.0003;  // 0.3 m
      static PANEL_GAP   = 0.008;   // 8 m between panels

      static BUS_X = AISatMini.PANEL_DEPTH / 2; // 6 m — half panel width
      static BUS_Y = 0.001;                      // 1 m thin
      static BUS_Z = 0.015;                      // 15 m deep

      static RAD_X = AISatMini.PANEL_DEPTH; // 12 m — full panel width
      static RAD_Y = 0.0005;                // 0.5 m thin
      static RAD_Z = 0.012;                 // 12 m deep each
      static RAD_GAP = 0.003;               // 3 m between radiator panels

      constructor() {
        super();
        this._buildMaterials();
        this._buildSolarPanels();
        this._buildCore();
        this._buildRadiators();
        this._buildFillLights();
      }

      _buildMaterials() {
        this._solarTex = AISatMini._createSolarTexture();

        this.materials = {
          solar: new THREE.MeshStandardMaterial({
            map: this._solarTex, color: 0x0d0d35,
            metalness: 0.3, roughness: 0.15,
            emissive: new THREE.Color(0x060618), emissiveIntensity: 0.7,
            side: THREE.DoubleSide,
          }),
          bus: new THREE.MeshStandardMaterial({
            color: 0x444444, metalness: 0.6, roughness: 0.5,
            emissive: new THREE.Color(0x080808), emissiveIntensity: 0.15,
          }),
          radiator: new THREE.MeshStandardMaterial({
            color: 0x888888, metalness: 0.4, roughness: 0.45,
            emissive: new THREE.Color(0x080808), emissiveIntensity: 0.15,
            side: THREE.DoubleSide,
          }),
        };
      }

      _buildSolarPanels() {
        const { PANEL_SPAN, PANEL_DEPTH, PANEL_THICK, PANEL_GAP } = AISatMini;
        const SECTIONS = 4;
        const SECTION_GAP = 0.0003;
        const sectionSpan = (PANEL_SPAN - (SECTIONS - 1) * SECTION_GAP) / SECTIONS;
        const geo = new THREE.BoxGeometry(PANEL_DEPTH, sectionSpan, PANEL_THICK);
        for (const sign of [-1, 1]) {
          const wingStart = sign * (PANEL_GAP / 2);
          for (let i = 0; i < SECTIONS; i++) {
            const panel = new THREE.Mesh(geo, this.materials.solar);
            const offset = sectionSpan / 2 + i * (sectionSpan + SECTION_GAP);
            panel.position.y = wingStart + sign * offset;
            this.add(panel);
          }
        }
      }

      _buildCore() {
        const { BUS_X, BUS_Y, BUS_Z } = AISatMini;
        const geo = new THREE.BoxGeometry(BUS_X, BUS_Y, BUS_Z);
        this.add(new THREE.Mesh(geo, this.materials.bus));
      }

      _buildRadiators() {
        const { RAD_X, RAD_Y, RAD_Z, RAD_GAP, BUS_Z } = AISatMini;
        const geo = new THREE.BoxGeometry(RAD_X, RAD_Y, RAD_Z);
        const zStart = BUS_Z / 2 + RAD_Z / 2 + 0.003;
        for (let i = 0; i < 2; i++) {
          const panel = new THREE.Mesh(geo, this.materials.radiator);
          panel.position.z = zStart + i * (RAD_Z + RAD_GAP);
          this.add(panel);
        }
        // Connecting bar from center of core to center of outer radiator
        const lastRadCenter = zStart + (RAD_Z + RAD_GAP);
        const barLength = lastRadCenter; // from z=0 (core center) to outer radiator center
        const barGeo = new THREE.BoxGeometry(0.0005, 0.0004, barLength);
        const bar = new THREE.Mesh(barGeo, this.materials.bus);
        bar.position.z = barLength / 2;
        this.add(bar);
      }

      _buildFillLights() {
        const a = new THREE.PointLight(0x8899bb, 0.4, 0.5);
        a.position.set(-0.08, 0.06, -0.12);
        this.add(a);
        const b = new THREE.PointLight(0x667799, 0.2, 0.5);
        b.position.set(0.06, -0.04, 0.08);
        this.add(b);
      }

      static _createSolarTexture() {
        const c = document.createElement('canvas');
        c.width = 256; c.height = 256;
        const ctx = c.getContext('2d');
        // Base dark blue
        ctx.fillStyle = '#0a0a2a';
        ctx.fillRect(0, 0, 256, 256);
        // Individual solar cells - 8x8 grid per tile
        const cells = 8;
        const cellW = 256 / cells;
        const cellH = 256 / cells;
        const cellPad = 1.5;
        for (let r = 0; r < cells; r++) {
          for (let col = 0; col < cells; col++) {
            const x = col * cellW + cellPad;
            const y = r * cellH + cellPad;
            const w = cellW - cellPad * 2;
            const h = cellH - cellPad * 2;
            // Slight color variation per cell
            const v = Math.floor(Math.random() * 12);
            ctx.fillStyle = `rgb(${14 + v}, ${14 + v}, ${48 + v})`;
            ctx.fillRect(x, y, w, h);
            // Cell bus bars (thin silver lines)
            ctx.strokeStyle = 'rgba(140, 150, 180, 0.25)';
            ctx.lineWidth = 0.5;
            const midX = x + w / 2;
            ctx.beginPath(); ctx.moveTo(midX, y); ctx.lineTo(midX, y + h); ctx.stroke();
            // Horizontal bus bars
            ctx.strokeStyle = 'rgba(140, 150, 180, 0.12)';
            for (let b = 1; b < 4; b++) {
              const by = y + (h * b) / 4;
              ctx.beginPath(); ctx.moveTo(x, by); ctx.lineTo(x + w, by); ctx.stroke();
            }
          }
        }
        // Thicker grid lines between cell groups (every 2 cells)
        ctx.strokeStyle = 'rgba(30, 30, 60, 0.9)';
        ctx.lineWidth = 2;
        for (let i = 0; i <= 4; i++) {
          const p = (i / 4) * 256;
          ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, 256); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(256, p); ctx.stroke();
        }
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(1, 4);
        return tex;
      }
    }

    // ══════════════════════════════════════════════════════════
    // Scene setup
    // ══════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('c'),
      antialias: true,
      logarithmicDepthBuffer: true,
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.00005, 200000);

    // ── Texture loading ──────────────────────────────────────
    const allTextures = [];
    const loadingManager = new THREE.LoadingManager();
    loadingManager.onLoad = () => {
      allTextures.forEach(t => renderer.initTexture(t));
      renderer.compile(scene, camera);
      renderer.render(scene, camera);
      renderer.render(scene, camera);
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        (function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        })();
      }, 100);
    };
    const textureLoader = new THREE.TextureLoader(loadingManager);
    const loadTex = (url) => {
      const tex = textureLoader.load(url);
      tex.colorSpace = THREE.SRGBColorSpace;
      allTextures.push(tex);
      return tex;
    };

    // ── Starfield ────────────────────────────────────────────
    {
      const N = 3000, pos = new Float32Array(N * 3);
      for (let i = 0; i < N; i++) {
        const θ = Math.random() * Math.PI * 2;
        const φ = Math.acos(2 * Math.random() - 1);
        pos[i*3] = 90000 * Math.sin(φ) * Math.cos(θ);
        pos[i*3+1] = 90000 * Math.sin(φ) * Math.sin(θ);
        pos[i*3+2] = 90000 * Math.cos(φ);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
        color: 0xffffff, size: 20, sizeAttenuation: true,
        transparent: true, opacity: 0.8, depthWrite: false,
      })));
    }

    // ── Earth ────────────────────────────────────────────────
    {
      const earth = new THREE.Group();

      // Surface
      const geo = new THREE.SphereGeometry(EARTH_RADIUS, 128, 64);
      const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
        map: loadTex('textures/earth_daymap.jpg'),
        emissiveMap: loadTex('textures/earth_nightmap.jpg'),
        emissive: new THREE.Color(1, 1, 1), emissiveIntensity: 0.6,
        roughness: 0.85, metalness: 0.05,
      }));
      mesh.rotation.y = -1.2;
      earth.add(mesh);

      // Clouds
      const clouds = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_RADIUS * 1.001, 96, 48),
        new THREE.MeshStandardMaterial({
          map: loadTex('textures/earth_clouds.jpg'),
          transparent: true, opacity: 0.35, depthWrite: false, side: THREE.DoubleSide,
        })
      );
      clouds.rotation.y = 0.5;
      earth.add(clouds);

      // Atmosphere
      const atmos = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_RADIUS * 1.005, 64, 32),
        new THREE.ShaderMaterial({
          vertexShader: ATMOS_VS, fragmentShader: ATMOS_FS,
          uniforms: {
            uColor: { value: new THREE.Color(0.3, 0.6, 1.0) },
            uIntensity: { value: 1.2 },
          },
          side: THREE.BackSide, transparent: true,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      atmos.renderOrder = 1;
      earth.add(atmos);

      scene.add(earth);
    }

    // ── Sun & Lighting ───────────────────────────────────────
    {
      const sunPos = SUN_DIR.clone().multiplyScalar(SUN_DIST);

      scene.add(new THREE.DirectionalLight(0xfff5e0, 3.5).translateX(sunPos.x).translateY(sunPos.y).translateZ(sunPos.z));
      scene.add(new THREE.AmbientLight(0x223344, 0.3));
      scene.add(new THREE.HemisphereLight(0x4488cc, 0x000000, 0.08));

      // Sun glow
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      g.addColorStop(0, 'rgba(255,255,240,1)');
      g.addColorStop(0.1, 'rgba(255,250,220,0.9)');
      g.addColorStop(0.3, 'rgba(255,220,150,0.4)');
      g.addColorStop(0.6, 'rgba(255,180,80,0.1)');
      g.addColorStop(1, 'rgba(255,150,50,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 256, 256);
      const glowTex = new THREE.CanvasTexture(c);
      const spriteMat = new THREE.SpriteMaterial({
        map: glowTex, blending: THREE.AdditiveBlending,
        transparent: true, depthWrite: false,
      });

      const glow = new THREE.Sprite(spriteMat);
      glow.position.copy(sunPos);
      glow.scale.setScalar(8000);
      glow.renderOrder = 2;
      scene.add(glow);

      const core = new THREE.Sprite(spriteMat.clone());
      core.position.copy(sunPos);
      core.scale.setScalar(2000);
      core.renderOrder = 3;
      scene.add(core);
    }

    // ── Satellite ────────────────────────────────────────────
    const satellite = new AISatMini();
    satellite.position.set(SAT_DISTANCE, 0, 0);
    // Rotate around solar panel axis (Y) so panels face the sun
    satellite.rotation.y = Math.atan2(-SUN_DIR.x, -SUN_DIR.z);
    scene.add(satellite);

    // ── Camera & Controls ────────────────────────────────────
    const satPos = new THREE.Vector3(SAT_DISTANCE, 0, 0);
    camera.position.set(SAT_DISTANCE + 0.07, 0.02, 0.08);
    camera.lookAt(satPos);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.copy(satPos);
    controls.minDistance = 0.005;
    controls.maxDistance = 25000;
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.5;
    controls.enableZoom = false;
    controls.update();

    // Logarithmic zoom: slow when close, fast when far
    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      const dist = camera.position.distanceTo(controls.target);
      const factor = Math.max(dist * 0.08, 0.002);
      const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
      const newDist = THREE.MathUtils.clamp(
        dist + (e.deltaY > 0 ? factor : -factor),
        controls.minDistance, controls.maxDistance
      );
      camera.position.copy(controls.target).addScaledVector(dir, newDist);
    }, { passive: false });

    // ── Resize ───────────────────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
  <!-- 100% privacy-first analytics -->
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
