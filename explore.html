<body>

    <span class="its">It's</span>

  <canvas id="c"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ── Constants (1 unit = 1 km) ────────────────────────────
    const EARTH_RADIUS = 6371;
    const GM = 398600.4418; // km³/s² — standard gravitational parameter
    let satAltitude = 1000;
    let satDistance = EARTH_RADIUS + satAltitude;
    const SUN_DIR = new THREE.Vector3(-1, 0, 0).normalize(); // perpendicular to polar orbit plane
    const SUN_DIST = 500000;

    function orbitalVelocity(alt) { return Math.sqrt(GM / (EARTH_RADIUS + alt)); }
    function orbitalPeriod(alt) { const r = EARTH_RADIUS + alt; return 2 * Math.PI * r / orbitalVelocity(alt); }

    // ── Atmosphere shader with Rayleigh-style scattering ─────
    const ATMOS_VS = `
      #include <common>
      #include <logdepthbuf_pars_vertex>
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;
      void main() {
        vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
        vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        #include <logdepthbuf_vertex>
      }
    `;
    const ATMOS_FS = `
      #include <common>
      #include <logdepthbuf_pars_fragment>
      uniform vec3 uSunDir;
      uniform float uIntensity;
      varying vec3 vWorldNormal;
      varying vec3 vWorldPosition;
      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorldPosition);
        vec3 normal = normalize(vWorldNormal);

        // Fresnel rim
        float fresnel = pow(max(1.0 - dot(normal, viewDir), 0.0), 3.0);

        // Sun illumination — atmosphere only glows on sunlit side
        float sunDot = dot(normal, uSunDir);
        float sunMask = smoothstep(-0.15, 0.3, sunDot); // fade at terminator
        float sunGlow = pow(max(sunDot, 0.0), 2.0) * 0.6;

        // Rayleigh-style color: blue at edges, warm near sun
        vec3 blueScatter = vec3(0.25, 0.55, 1.0);
        vec3 warmScatter = vec3(1.0, 0.7, 0.4);
        vec3 color = mix(blueScatter, warmScatter, sunGlow);

        // Forward scattering (bright halo when looking toward sun through atmosphere)
        float viewSunDot = max(dot(-viewDir, uSunDir), 0.0);
        float forwardScatter = pow(viewSunDot, 8.0) * 0.5;

        float lit = fresnel * sunMask + forwardScatter;
        float alpha = lit * 0.85;
        vec3 finalColor = color * lit * uIntensity;

        gl_FragColor = vec4(finalColor, alpha);
        #include <logdepthbuf_fragment>
      }
    `;

    // ══════════════════════════════════════════════════════════
    // AISatMini — orbital datacenter satellite
    // ══════════════════════════════════════════════════════════
    class AISatMini extends THREE.Group {
      // Local frame:  X = radial,  Y = along-track,  Z = sun direction (-Z toward sun)
      // Solar panels: perpendicular to sun (flat in X-Y)
      // Core + radiators: parallel to sun rays (flat in X-Z, thin in Y)

      static PANEL_SPAN = 0.085;   // 85 m each wing (170 m total)
      static PANEL_DEPTH = 0.012;   // 12 m
      static PANEL_THICK = 0.0003;  // 0.3 m
      static PANEL_GAP = 0.008;   // 8 m between panels

      static BUS_X = AISatMini.PANEL_DEPTH / 2; // 6 m — half panel width
      static BUS_Y = 0.001;                      // 1 m thin
      static BUS_Z = 0.015;                      // 15 m deep

      static RAD_X = AISatMini.PANEL_DEPTH; // 12 m — full panel width
      static RAD_Y = 0.0005;                // 0.5 m thin
      static RAD_Z = 0.012;                 // 12 m deep each
      static RAD_GAP = 0.001;               // 1 m between radiator panels

      constructor() {
        super();
        this._buildMaterials();
        this._buildSolarPanels();
        this._buildCore();
        this._buildRadiators();
        this._buildLabels();
      }

      _buildMaterials() {
        this._solarTex = AISatMini._createSolarTexture();

        this.materials = {
          solarFront: new THREE.MeshStandardMaterial({
            map: this._solarTex, color: 0x555580,
            metalness: 0.35, roughness: 0.18,
            emissive: new THREE.Color(0x0a0a28), emissiveIntensity: 3.5,
          }),
          solarBack: new THREE.MeshStandardMaterial({
            color: 0x363636, metalness: 0.1, roughness: 0.9,
            emissive: new THREE.Color(0x080808), emissiveIntensity: 0.6,
          }),
          bus: new THREE.MeshStandardMaterial({
            color: 0x444444, metalness: 0.6, roughness: 0.5,
            emissive: new THREE.Color(0x181818), emissiveIntensity: 1.8,
          }),
          radiator: new THREE.MeshStandardMaterial({
            map: AISatMini._createRadiatorTexture(),
            color: 0xcccccc, metalness: 0.6, roughness: 0.35,
            emissive: new THREE.Color(0x1a1512), emissiveIntensity: 1.3,
            side: THREE.DoubleSide,
          }),
        };
      }

      _buildSolarPanels() {
        const { PANEL_SPAN, PANEL_DEPTH, PANEL_THICK, PANEL_GAP } = AISatMini;
        const SECTIONS = 4;
        const SECTION_GAP = 0.0003;
        const sectionSpan = (PANEL_SPAN - (SECTIONS - 1) * SECTION_GAP) / SECTIONS;
        const geo = new THREE.BoxGeometry(PANEL_DEPTH, sectionSpan, PANEL_THICK);
        // BoxGeometry faces: +X, -X, +Y, -Y, +Z (front), -Z (back)
        const { solarFront, solarBack } = this.materials;
        const panelMats = [solarBack, solarBack, solarBack, solarBack, solarFront, solarBack];
        for (const sign of [-1, 1]) {
          const wingStart = sign * (PANEL_GAP / 2);
          for (let i = 0; i < SECTIONS; i++) {
            const panel = new THREE.Mesh(geo, panelMats);
            const offset = sectionSpan / 2 + i * (sectionSpan + SECTION_GAP);
            panel.position.y = wingStart + sign * offset;
            this.add(panel);
          }
        }
        // Connecting beam along Y spanning both wings
        const totalSpan = 2 * (PANEL_SPAN + PANEL_GAP / 2);
        const beamGeo = new THREE.BoxGeometry(0.0002, totalSpan, 0.00016);
        const beam = new THREE.Mesh(beamGeo, this.materials.bus);
        this.add(beam);
      }

      _buildCore() {
        const { BUS_X, BUS_Y, BUS_Z } = AISatMini;
        const geo = new THREE.BoxGeometry(BUS_X, BUS_Y, BUS_Z);
        this.add(new THREE.Mesh(geo, this.materials.bus));
      }

      _buildRadiators() {
        const { RAD_X, RAD_Y, RAD_Z, RAD_GAP, BUS_Z } = AISatMini;
        const geo = new THREE.BoxGeometry(RAD_X, RAD_Y, RAD_Z);
        const zStart = -(BUS_Z / 2 + RAD_Z / 2 + 0.001);
        for (let i = 0; i < 2; i++) {
          const panel = new THREE.Mesh(geo, this.materials.radiator);
          panel.position.z = zStart - i * (RAD_Z + RAD_GAP);
          this.add(panel);
        }
        // Connecting bar from center of core to center of outer radiator
        const lastRadCenter = zStart - (RAD_Z + RAD_GAP);
        const barLength = Math.abs(lastRadCenter);
        const barGeo = new THREE.BoxGeometry(0.0005, 0.0004, barLength);
        const bar = new THREE.Mesh(barGeo, this.materials.bus);
        bar.position.z = lastRadCenter / 2;
        this.add(bar);
      }

      _buildLabels() {
        this.labels = [];
        const createLabel = (text, pos, isRight) => {
          const S = 1024; const H = 128;
          const c = document.createElement('canvas');
          c.width = S; c.height = H;
          const ctx = c.getContext('2d');

          const dotR = 8, lineW = 200, lineH = 2, textPad = 24;
          const dotX = isRight ? 64 : S - 64;

          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.font = '400 36px "Helvetica Neue", Arial, sans-serif';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = 8; ctx.shadowOffsetY = 2;

          ctx.beginPath(); ctx.arc(dotX, H / 2, dotR, 0, Math.PI * 2); ctx.fill();

          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          if (isRight) {
            ctx.fillRect(dotX + dotR * 1.5, H / 2 - lineH / 2, lineW, lineH);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText(text.toUpperCase(), dotX + dotR * 1.5 + lineW + textPad, H / 2);
          } else {
            ctx.fillRect(dotX - dotR * 1.5 - lineW, H / 2 - lineH / 2, lineW, lineH);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            const tw = ctx.measureText(text.toUpperCase()).width;
            ctx.fillText(text.toUpperCase(), dotX - dotR * 1.5 - lineW - textPad - tw, H / 2);
          }

          const tex = new THREE.CanvasTexture(c);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.minFilter = THREE.LinearFilter;
          const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0, depthTest: false });
          const sprite = new THREE.Sprite(mat);
          sprite.center.set(dotX / S, 0.5);
          sprite.position.copy(pos);

          const aspect = S / H;
          sprite.scale.set(0.008 * aspect, 0.008, 1);
          sprite.renderOrder = 10; // overlay on top

          this.add(sprite);
          this.labels.push(sprite);
        };

        createLabel('Solar Array', new THREE.Vector3(0, 0.045, 0), true);
        createLabel('Compute Core', new THREE.Vector3(0.005, 0, 0.005), false);
        createLabel('Radiators', new THREE.Vector3(0, 0, -0.015), true);
      }

      static _createSolarTexture() {
        const S = 512;
        const c = document.createElement('canvas');
        c.width = S; c.height = S;
        const ctx = c.getContext('2d');

        // Dark substrate (gaps between cells)
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, S, S);

        const cells = 12;
        const cellW = S / cells;
        const cellH = S / cells;
        const pad = 1.8;
        const rad = 3;

        for (let r = 0; r < cells; r++) {
          for (let col = 0; col < cells; col++) {
            const x = col * cellW + pad;
            const y = r * cellH + pad;
            const w = cellW - pad * 2;
            const h = cellH - pad * 2;

            // Cell gradient — medium blue
            const v = Math.random() * 10;
            const grad = ctx.createLinearGradient(x, y, x + w * 0.3, y + h);
            grad.addColorStop(0, `rgb(${22 + v}, ${26 + v}, ${80 + v})`);
            grad.addColorStop(0.5, `rgb(${20 + v}, ${24 + v}, ${72 + v})`);
            grad.addColorStop(1, `rgb(${16 + v}, ${20 + v}, ${65 + v})`);

            ctx.beginPath();
            ctx.roundRect(x, y, w, h, rad);
            ctx.fillStyle = grad;
            ctx.fill();

            // Subtle specular highlight
            const hl = ctx.createRadialGradient(x + w * 0.35, y + h * 0.25, 0, x + w * 0.35, y + h * 0.25, w * 0.6);
            hl.addColorStop(0, 'rgba(130, 150, 220, 0.1)');
            hl.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, rad);
            ctx.fillStyle = hl;
            ctx.fill();

            // Central vertical bus bar (silver)
            const midX = x + w / 2;
            ctx.strokeStyle = 'rgba(180, 190, 210, 0.35)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(midX, y + 3); ctx.lineTo(midX, y + h - 3); ctx.stroke();

            // Horizontal finger electrodes
            ctx.strokeStyle = 'rgba(180, 190, 210, 0.15)';
            ctx.lineWidth = 0.6;
            const fingers = 8;
            for (let f = 1; f < fingers; f++) {
              const fy = y + (h * f) / fingers;
              ctx.beginPath(); ctx.moveTo(x + 4, fy); ctx.lineTo(x + w - 4, fy); ctx.stroke();
            }
          }
        }

        // Interconnect wiring between rows
        ctx.strokeStyle = 'rgba(160, 170, 190, 0.3)';
        ctx.lineWidth = 2.5;
        for (let r = 1; r < cells; r++) {
          const ly = r * cellH;
          ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(S, ly); ctx.stroke();
        }

        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(1, 3);
        return tex;
      }

      static _createRadiatorTexture() {
        const S = 256;
        const c = document.createElement('canvas');
        c.width = S; c.height = S;
        const ctx = c.getContext('2d');

        // White/light grey base — radiators are white to radiate heat
        ctx.fillStyle = '#c8c8cc';
        ctx.fillRect(0, 0, S, S);

        // Vertical heat pipe channels
        const pipes = 12;
        const pipeW = S / pipes;
        for (let i = 0; i < pipes; i++) {
          const x = i * pipeW;
          // Pipe channel groove (darker stripe)
          ctx.fillStyle = `rgba(0, 0, 0, ${0.06 + Math.random() * 0.04})`;
          ctx.fillRect(x + pipeW * 0.1, 0, pipeW * 0.15, S);

          // Pipe highlight (lighter stripe next to groove)
          ctx.fillStyle = `rgba(255, 255, 255, ${0.08 + Math.random() * 0.04})`;
          ctx.fillRect(x + pipeW * 0.3, 0, pipeW * 0.12, S);
        }

        // Horizontal panel seams
        const seams = 4;
        ctx.strokeStyle = 'rgba(60, 60, 70, 0.4)';
        ctx.lineWidth = 1.5;
        for (let i = 1; i < seams; i++) {
          const y = (i / seams) * S;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(S, y); ctx.stroke();
        }

        // Subtle edge darkening
        const edgeGrad = ctx.createLinearGradient(0, 0, S, 0);
        edgeGrad.addColorStop(0, 'rgba(0,0,0,0.06)');
        edgeGrad.addColorStop(0.1, 'rgba(0,0,0,0)');
        edgeGrad.addColorStop(0.9, 'rgba(0,0,0,0)');
        edgeGrad.addColorStop(1, 'rgba(0,0,0,0.06)');
        ctx.fillStyle = edgeGrad;
        ctx.fillRect(0, 0, S, S);

        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(1, 2);
        return tex;
      }
    }

    // ══════════════════════════════════════════════════════════
    // Scene setup
    // ══════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('c'),
      antialias: true,
      logarithmicDepthBuffer: true,
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.00005, 2000000);

    // ── Post-processing: Bloom ───────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      /* strength */ 0.28,
      /* radius   */ 0.35,
      /* threshold */ 0.82
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ── Texture loading ──────────────────────────────────────
    const allTextures = [];
    const loadingManager = new THREE.LoadingManager();
    loadingManager.onLoad = () => {
      allTextures.forEach(t => renderer.initTexture(t));
      renderer.compile(scene, camera);
      renderer.render(scene, camera);
      renderer.render(scene, camera);
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';



        const clock = new THREE.Clock();
        let totalTime = 0;
        const _sunNDC = new THREE.Vector3();
        const _screenCenter = new THREE.Vector2(0, 0);

        (function animate() {
          requestAnimationFrame(animate);
          const dt = clock.getDelta();
          totalTime += dt;

          // Earth rotation (around Y axis)
          earthMesh.rotation.y += EARTH_BASE * timeScale * dt;
          cloudsMesh.rotation.y += EARTH_BASE * timeScale * dt * 1.05;

          // Satellite orbit (rotate pivot around its local Z)
          orbitPivot.rotation.z -= satBase * timeScale * dt;

          // Fade orbit ring based on zoom distance
          const camDist = camera.position.distanceTo(controls.target);
          orbitMat.opacity = THREE.MathUtils.clamp((camDist - 5) / 500, 0, 0.08);

          // Keep the camera following the satellite / Earth blend
          // (see "Zoom target blending" comment block for full explanation)
          const prevTarget = controls.target.clone();
          satellite.getWorldPosition(satPos);

          const blend = targetBlend(camDist);
          const desiredTarget = satPos.clone().lerp(new THREE.Vector3(0, 0, 0), blend);

          const delta = desiredTarget.clone().sub(prevTarget);
          controls.target.copy(desiredTarget);
          camera.position.add(delta);

          controls.update();

          // ── Twinkling stars ────────────────────────────────
          starLayers.forEach((layer, i) => {
            const twinkle = Math.sin(totalTime * (0.8 + i * 0.3) + layer.phase) * 0.12;
            layer.points.material.opacity = THREE.MathUtils.clamp(layer.baseOpacity + twinkle, 0.1, 1.0);
          });

          // ── Lens flare update ──────────────────────────────
          if (lensFlareSprites.length > 0) {
            // Project sun to NDC
            _sunNDC.copy(lensFlareSprites[0].sunPos);
            _sunNDC.project(camera);
            const sunVisible = _sunNDC.z < 1.0; // in front of camera
            // Sun screen pos (-1..1)
            const sx = _sunNDC.x, sy = _sunNDC.y;
            // Angle from sun to screen center
            const dx = _screenCenter.x - sx, dy = _screenCenter.y - sy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // Fade based on distance from screen center & whether sun is visible
            const flareFade = sunVisible ? THREE.MathUtils.clamp(1.0 - dist * 0.5, 0, 1) : 0;

            lensFlareSprites.forEach(({ sprite, t, sunPos }) => {
              // Position along the vector from sun to center, extended beyond
              const fx = sx + dx * t * 2.2;
              const fy = sy + dy * t * 2.2;
              // Unproject back to world space at the sun's depth
              const worldPos = new THREE.Vector3(fx, fy, _sunNDC.z).unproject(camera);
              sprite.position.copy(worldPos);
              const baseAlpha = (0.03 + (1.0 - t) * 0.04) * flareFade;
              sprite.material.opacity = baseAlpha;
            });
          }

          // Update Labels
          const fadeStart = 0.16;
          const fadeFull = 0.22;
          const fadeOutStart = 0.8;
          const fadeOutEnd = 1.5;

          let labelOpacity = 0;
          if (camDist > fadeStart && camDist < fadeOutEnd) {
            if (camDist < fadeFull) {
              labelOpacity = (camDist - fadeStart) / (fadeFull - fadeStart);
            } else if (camDist > fadeOutStart) {
              labelOpacity = 1.0 - (camDist - fadeOutStart) / (fadeOutEnd - fadeOutStart);
            } else {
              labelOpacity = 1.0;
            }
          }

          satellite.labels.forEach(s => { s.material.opacity = labelOpacity; });

          composer.render();
        })();
      }, 100);
    };
    const textureLoader = new THREE.TextureLoader(loadingManager);
    const loadTex = (url) => {
      const tex = textureLoader.load(url);
      tex.colorSpace = THREE.SRGBColorSpace;
      allTextures.push(tex);
      return tex;
    };

    // ── Starfield (enhanced — multi-layer with twinkling) ────
    const starLayers = [];
    {
      // Layer 1: many small dim stars
      const N1 = 4000, pos1 = new Float32Array(N1 * 3), sz1 = new Float32Array(N1);
      for (let i = 0; i < N1; i++) {
        const θ = Math.random() * Math.PI * 2;
        const φ = Math.acos(2 * Math.random() - 1);
        const r = 500000;
        pos1[i * 3] = r * Math.sin(φ) * Math.cos(θ);
        pos1[i * 3 + 1] = r * Math.sin(φ) * Math.sin(θ);
        pos1[i * 3 + 2] = r * Math.cos(φ);
        sz1[i] = 6 + Math.random() * 14;
      }
      const geo1 = new THREE.BufferGeometry();
      geo1.setAttribute('position', new THREE.BufferAttribute(pos1, 3));
      geo1.setAttribute('size', new THREE.BufferAttribute(sz1, 1));
      const mat1 = new THREE.PointsMaterial({
        color: 0xd0d8ef, size: 10, sizeAttenuation: true,
        transparent: true, opacity: 0.65, depthWrite: false,
      });
      const stars1 = new THREE.Points(geo1, mat1);
      scene.add(stars1);
      starLayers.push({ points: stars1, baseOpacity: 0.65, phase: Math.random() * Math.PI * 2 });

      // Layer 2: fewer bright stars
      const N2 = 400, pos2 = new Float32Array(N2 * 3);
      for (let i = 0; i < N2; i++) {
        const θ = Math.random() * Math.PI * 2;
        const φ = Math.acos(2 * Math.random() - 1);
        const r = 500000;
        pos2[i * 3] = r * Math.sin(φ) * Math.cos(θ);
        pos2[i * 3 + 1] = r * Math.sin(φ) * Math.sin(θ);
        pos2[i * 3 + 2] = r * Math.cos(φ);
      }
      const geo2 = new THREE.BufferGeometry();
      geo2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
      const mat2 = new THREE.PointsMaterial({
        color: 0xffeedd, size: 28, sizeAttenuation: true,
        transparent: true, opacity: 0.9, depthWrite: false,
      });
      const stars2 = new THREE.Points(geo2, mat2);
      scene.add(stars2);
      starLayers.push({ points: stars2, baseOpacity: 0.9, phase: Math.random() * Math.PI * 2 });
    }

    // ── Earth ────────────────────────────────────────────────
    const earthGroup = new THREE.Group();
    let earthMesh, cloudsMesh;
    {
      // Surface
      const geo = new THREE.SphereGeometry(EARTH_RADIUS, 128, 64);
      earthMesh = new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({
        map: loadTex('textures/earth_daymap.jpg'),
        emissiveMap: loadTex('textures/earth_nightmap.jpg'),
        emissive: new THREE.Color(1, 1, 1), emissiveIntensity: 0.02,
        roughness: 0.7, metalness: 0.05,
        clearcoat: 0.1, clearcoatRoughness: 0.4,
        sheen: 0.05, sheenRoughness: 0.8,
        sheenColor: new THREE.Color(0.3, 0.5, 0.8),
      }));
      earthMesh.rotation.y = -1.2;
      earthGroup.add(earthMesh);

      // Clouds
      cloudsMesh = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_RADIUS * 1.001, 96, 48),
        new THREE.MeshStandardMaterial({
          map: loadTex('textures/earth_clouds.jpg'),
          transparent: true, opacity: 0.35, depthWrite: false, side: THREE.DoubleSide,
        })
      );
      cloudsMesh.rotation.y = 0.5;
      earthGroup.add(cloudsMesh);

      // Outer atmosphere (Rayleigh scattering)
      const atmos = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_RADIUS * 1.008, 64, 32),
        new THREE.ShaderMaterial({
          vertexShader: ATMOS_VS, fragmentShader: ATMOS_FS,
          uniforms: {
            uSunDir: { value: SUN_DIR.clone() },
            uIntensity: { value: 1.4 },
          },
          side: THREE.BackSide, transparent: true,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      atmos.renderOrder = 1;
      earthGroup.add(atmos);

      // Inner atmosphere (tight rim glow)
      const innerAtmos = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_RADIUS * 1.003, 64, 32),
        new THREE.ShaderMaterial({
          vertexShader: ATMOS_VS, fragmentShader: ATMOS_FS,
          uniforms: {
            uSunDir: { value: SUN_DIR.clone() },
            uIntensity: { value: 0.6 },
          },
          side: THREE.BackSide, transparent: true,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      innerAtmos.renderOrder = 1;
      earthGroup.add(innerAtmos);

      scene.add(earthGroup);
    }

    // ── Sun & Lighting ───────────────────────────────────────
    let lensFlareSprites = [];
    {
      const sunPos = SUN_DIR.clone().multiplyScalar(SUN_DIST);

      scene.add(new THREE.DirectionalLight(0xfff5e0, 3.5).translateX(sunPos.x).translateY(sunPos.y).translateZ(sunPos.z));
      scene.add(new THREE.AmbientLight(0xffffff, 0.04));
      scene.add(new THREE.HemisphereLight(0x8899aa, 0x111111, 0.08));

      // ── Layered sun corona ────────────────────────────────
      function makeSunCanvas(size, stops) {
        const c = document.createElement('canvas');
        c.width = c.height = size;
        const ctx = c.getContext('2d');
        const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
        stops.forEach(([t, col]) => g.addColorStop(t, col));
        ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
        return new THREE.CanvasTexture(c);
      }

      const coronaTex = makeSunCanvas(512, [
        [0, 'rgba(255,255,255,1)'],
        [0.12, 'rgba(255,255,255,1)'],
        [0.2, 'rgba(255,255,240,0.9)'],
        [0.35, 'rgba(255,248,220,0.6)'],
        [0.6, 'rgba(255,200,100,0.2)'],
        [1, 'rgba(255,100,30,0)']
      ]);
      const glowTex = makeSunCanvas(256, [
        [0, 'rgba(255,255,255,0.95)'],
        [0.15, 'rgba(255,255,240,0.7)'],
        [0.45, 'rgba(255,230,150,0.25)'],
        [1, 'rgba(255,140,50,0)']
      ]);

      const addSprite = (tex, pos, scale, order) => {
        const s = new THREE.Sprite(new THREE.SpriteMaterial({
          map: tex, blending: THREE.AdditiveBlending,
          transparent: true, depthWrite: false,
        }));
        s.position.copy(pos); s.scale.setScalar(scale); s.renderOrder = order;
        scene.add(s); return s;
      };

      addSprite(coronaTex, sunPos, 160000, 2);  // large outer corona
      addSprite(glowTex, sunPos, 85000, 2);  // mid glow
      addSprite(coronaTex, sunPos, 55000, 3);  // bright inner disk
      addSprite(coronaTex, sunPos, 32000, 4);  // hot white core
      addSprite(coronaTex, sunPos, 14000, 5);  // overexposed blinding centre

      // ── Lens flare ───────────────────────────────────────
      // Flare elements are placed along the line from sun through screen center
      function makeFlareCanvas(size, color, shape = 'circle') {
        const c = document.createElement('canvas');
        c.width = c.height = size;
        const ctx = c.getContext('2d');
        if (shape === 'ring') {
          ctx.strokeStyle = color;
          ctx.lineWidth = size * 0.05;
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size * 0.38, 0, Math.PI * 2);
          ctx.stroke();
        } else if (shape === 'streak') {
          // hexagonal "anamorphic" streak
          ctx.strokeStyle = color;
          ctx.lineWidth = size * 0.04;
          ctx.globalAlpha = 0.5;
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI;
            const x1 = size / 2 + Math.cos(a) * size * 0.5;
            const y1 = size / 2 + Math.sin(a) * size * 0.5;
            const x2 = size / 2 - Math.cos(a) * size * 0.5;
            const y2 = size / 2 - Math.sin(a) * size * 0.5;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
          }
        } else {
          const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
          g.addColorStop(0, color);
          g.addColorStop(0.35, color.replace('1)', '0.5)'));
          g.addColorStop(1, color.replace('1)', '0)'));
          ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
        }
        return new THREE.CanvasTexture(c);
      }

      const flareElements = [
        { t: 0.0, scale: 22000, color: 'rgba(255,255,220,1)', shape: 'circle' },
        { t: 0.18, scale: 8000, color: 'rgba(200,220,255,1)', shape: 'circle' },
        { t: 0.32, scale: 14000, color: 'rgba(255,200,100,1)', shape: 'ring' },
        { t: 0.50, scale: 6000, color: 'rgba(180,200,255,1)', shape: 'circle' },
        { t: 0.65, scale: 10000, color: 'rgba(255,180,80,1)', shape: 'circle' },
        { t: 0.80, scale: 5000, color: 'rgba(200,220,255,1)', shape: 'ring' },
        { t: 1.0, scale: 16000, color: 'rgba(120,160,255,1)', shape: 'circle' },
        { t: 0.25, scale: 30000, color: 'rgba(255,245,200,1)', shape: 'streak' },
      ];

      flareElements.forEach(({ t, scale, color, shape }) => {
        const tex = makeFlareCanvas(256, color, shape);
        const s = new THREE.Sprite(new THREE.SpriteMaterial({
          map: tex, blending: THREE.AdditiveBlending,
          transparent: true, depthWrite: false, opacity: 0,
        }));
        s.scale.setScalar(scale);
        s.renderOrder = 5;
        scene.add(s);
        lensFlareSprites.push({ sprite: s, t, baseDist: sunPos.length(), sunPos: sunPos.clone() });
      });
    }

    // ── Orbit ring (faint) ────────────────────────────────────
    const orbitMat = new THREE.MeshBasicMaterial({
      color: 0x4488ff, transparent: true, opacity: 0.08,
      side: THREE.DoubleSide, depthWrite: false,
    });
    function createOrbitRing() {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(satDistance - 2, satDistance + 2, 256, 1), orbitMat
      );
      ring.lookAt(SUN_DIR.clone().multiplyScalar(1000));
      return ring;
    }
    let orbitRing = createOrbitRing();
    scene.add(orbitRing);

    // ── Satellite ────────────────────────────────────────────
    const orbitPivot = new THREE.Group();
    scene.add(orbitPivot);
    orbitPivot.lookAt(SUN_DIR.clone().multiplyScalar(1000));

    const satellite = new AISatMini();
    satellite.position.set(0, satDistance, 0);
    // Orient: panels face sun (pivot's +Z), span tangent to orbit, radiator radial
    satellite.rotation.order = 'ZYX';
    satellite.rotation.z = Math.PI / 2;
    orbitPivot.add(satellite);

    // ── Animation constants ─────────────────────────────────
    let timeScale = 10;
    const EARTH_BASE = 2 * Math.PI / 86400;
    let satBase = 2 * Math.PI / orbitalPeriod(satAltitude);

    function setAltitude(alt) {
      satAltitude = alt;
      satDistance = EARTH_RADIUS + alt;
      satBase = 2 * Math.PI / orbitalPeriod(alt);
      satellite.position.set(0, satDistance, 0);
      // Rebuild orbit ring
      scene.remove(orbitRing);
      orbitRing.geometry.dispose();
      orbitRing = createOrbitRing();
      scene.add(orbitRing);
      // Update info
      const vel = orbitalVelocity(alt);
      document.getElementById('info-alt').textContent = alt + ' km';
      document.getElementById('info-vel').textContent = vel.toFixed(2) + ' km/s';
    }

    function initButtonGroup(selector, dataAttr, callback) {
      document.querySelectorAll(`${selector} button`).forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelector(`${selector} .active`).classList.remove('active');
          btn.classList.add('active');
          callback(Number(btn.dataset[dataAttr]));
        });
      });
    }

    initButtonGroup('#speed', 'speed', v => { timeScale = v; });
    initButtonGroup('#altitude', 'alt', setAltitude);

    // ── Camera & Controls ────────────────────────────────────
    const satPos = new THREE.Vector3();
    satellite.getWorldPosition(satPos);
    camera.position.set(satPos.x - 0.0185, satPos.y + 0.0741, satPos.z + 0.1174);
    camera.lookAt(satPos);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.copy(satPos);
    controls.minDistance = 0.005;
    controls.maxDistance = EARTH_RADIUS * 20;
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.5;
    controls.enableZoom = false;
    controls.update();

    // Expose for console debugging
    Object.assign(window, { camera, controls, satellite, scene, THREE });

    // ── Zoom target blending ──────────────────────────────────
    // As the camera zooms out, the orbit-controls target smoothly
    // shifts from the satellite to Earth's centre so the whole orbit
    // stays nicely framed.
    //
    // How it works:
    //   1. targetBlend(d) returns 0..1 based on camera-to-target distance.
    //      Below BLEND_START the target is the satellite; above BLEND_END
    //      it is Earth's centre; in between it's a smoothstep interpolation.
    //   2. applyZoom() uses the blend to:
    //        a) pick a dynamic minDistance so the camera never clips inside
    //           Earth (lerps from 0.005 km near the sat to just above the
    //           surface when centred on Earth),
    //        b) recompute the target for the *new* zoom distance and place
    //           the camera at the correct offset from it.
    //   3. The animation loop applies the same blend every frame so the
    //      target keeps tracking the satellite (when close) or stays
    //      locked to Earth (when far) even as the satellite moves.
    //
    const BLEND_START = EARTH_RADIUS;       // begin shifting at 1× Earth radius
    const BLEND_END   = EARTH_RADIUS * 10;  // fully centred on Earth at 10×
    const SAT_MIN_DIST = 0.005;
    const EARTH_MIN_DIST = EARTH_RADIUS * 1.015; // keep camera above the surface

    function targetBlend(d) {
      const t = THREE.MathUtils.clamp((d - BLEND_START) / (BLEND_END - BLEND_START), 0, 1);
      return t * t * (3 - 2 * t); // smoothstep
    }

    function applyZoom(delta) {
      const dist = camera.position.distanceTo(controls.target);
      const factor = Math.max(dist * 0.16, 0.002);
      const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();

      // Min distance scales with the blend so we never go inside Earth
      const blend = targetBlend(dist);
      const minDist = THREE.MathUtils.lerp(SAT_MIN_DIST, EARTH_MIN_DIST, blend);

      const newDist = THREE.MathUtils.clamp(
        dist + delta * factor,
        minDist, controls.maxDistance
      );

      // Recompute target for the new zoom level
      const newBlend = targetBlend(newDist);
      satellite.getWorldPosition(satPos);
      const newTarget = satPos.clone().lerp(new THREE.Vector3(0, 0, 0), newBlend);

      controls.target.copy(newTarget);
      camera.position.copy(newTarget).addScaledVector(dir, newDist);
    }

    // Logarithmic zoom: slow when close, fast when far
    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      applyZoom(e.deltaY > 0 ? 1 : -1);
    }, { passive: false });

    // Pinch zoom on mobile (logarithmic, matching scroll zoom)
    let prevPinchDist = 0;
    renderer.domElement.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        prevPinchDist = Math.sqrt(dx * dx + dy * dy);
      }
    }, { passive: true });
    renderer.domElement.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const pinchDist = Math.sqrt(dx * dx + dy * dy);
        const delta = prevPinchDist - pinchDist;
        prevPinchDist = pinchDist;
        applyZoom(delta * 0.0375);
      }
    }, { passive: false });

    // ── Resize ───────────────────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });
  </script>
